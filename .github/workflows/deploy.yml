name: Deploy

on:
  push:
    branches:
      - main

env:
  MWAA_NAME: "my-mwaa-environment"
  BUCKET_NAME: "my-mwaa-bucket"
  AWS_REGION: "us-east-1"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to MWAA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/my-mwaa-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      # Detect if infrastructure files changed
      - name: Check for infra changes
        uses: tj-actions/changed-files@v41
        id: infra_changes
        with:
          files: |
            requirements.txt
            plugins/**
            Makefile

      # --- Infra changed: rebuild & update MWAA environment ---

      - name: Upload supporting files to S3
        if: steps.infra_changes.outputs.any_changed == 'true'
        run: |
          aws s3 cp requirements.txt s3://${{ env.BUCKET_NAME }}/requirements.txt

      - name: Get S3 version IDs
        if: steps.infra_changes.outputs.any_changed == 'true'
        id: versions
        run: |
          REQ_VERSION=$(aws s3api head-object --bucket ${{ env.BUCKET_NAME }} --key requirements.txt --query 'VersionId' --output text)
          echo "requirements_version=$REQ_VERSION" >> $GITHUB_OUTPUT

      - name: Update MWAA environment
        if: steps.infra_changes.outputs.any_changed == 'true'
        run: |
          aws mwaa update-environment \
            --name ${{ env.MWAA_NAME }} \
            --requirements-s3-path requirements.txt \
            --requirements-s3-object-version ${{ steps.versions.outputs.requirements_version }}

      - name: Wait for MWAA to be available
        if: steps.infra_changes.outputs.any_changed == 'true'
        run: |
          MAX_ATTEMPTS=50
          SLEEP_SECONDS=60

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(aws mwaa get-environment \
              --name ${{ env.MWAA_NAME }} \
              --query 'Environment.Status' --output text)

            echo "Attempt $attempt: MWAA status is $STATUS"

            if [ "$STATUS" = "AVAILABLE" ]; then
              echo "MWAA environment is ready."
              exit 0
            elif [ "$STATUS" = "UPDATE_FAILED" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
              echo "MWAA update failed with status: $STATUS"
              exit 1
            fi

            sleep $SLEEP_SECONDS
          done

          echo "Timed out waiting for MWAA to become AVAILABLE"
          exit 1

      # --- Always: sync DAGs to S3 ---

      - name: Sync DAGs to S3
        run: aws s3 sync dags s3://${{ env.BUCKET_NAME }}/dags --delete
