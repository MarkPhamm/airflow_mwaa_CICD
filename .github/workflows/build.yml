name: Build

on:
  pull_request:
    branches:
      - main

jobs:
  verify_build:
    name: Verify build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Lint code
        run: ruff check .

      - name: Run tests
        run: pytest .
